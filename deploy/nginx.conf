server {
    listen 80;
    server_name yellowpipesengg.mywire.org www.yellowpipesengg.mywire.org;

    # The deployment script will place the built frontend files here
    root /var/www/yellowpipes/frontend/dist;
    index index.html index.htm;

    # Gzip Compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Serve Static Files and Fallback to index.html for React Router
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to Node.js Backend
    location /api/ {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_addrs;
    }

    # Deny access to hidden files (e.g. .git, .env)
    location ~ /\. {
        deny all;
    }
}
